server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # API proxy
    location /api/ {
        proxy_pass http://api:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public storage - only this path is statically served.
    # Paid files are NEVER served here; they go through API authorization.
    location /public-storage/ {
        alias /var/www/storage/public/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        autoindex off;
    }

    # Web app
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Webpack HMR websocket (dev)
    location /webpack-hmr {
        proxy_pass http://web:8000/webpack-hmr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
